name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore SaqueroJobs.sln

      - name: Build
        run: dotnet build SaqueroJobs.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test SaqueroJobs.sln --no-build --configuration Release --verbosity normal

